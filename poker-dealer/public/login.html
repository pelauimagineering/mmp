<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMP Poker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/design-system/tokens.css">
    <link rel="stylesheet" href="/design-system/components.css">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="theme-felt">
    <nav class="auth-topbar">
        <a href="https://mmp.pelau.com/" class="auth-topbar-brand">
            <svg viewBox="0 0 64 64" fill="none" stroke="currentColor"><ellipse cx="22" cy="32" rx="14" ry="18" stroke-width="4"/><ellipse cx="42" cy="32" rx="14" ry="18" stroke-width="4"/><path d="M28.4 18.6 Q 32 22 32 32 Q 32 42 28.4 45.4" stroke-width="4" stroke-linecap="round"/></svg>
            MMP
        </a>
        <a href="https://mmp.pelau.com/golf/" class="auth-topbar-switch">Switch to Golf →</a>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-mark" aria-hidden="true">
                    <svg viewBox="0 0 64 64" fill="none" stroke="currentColor"><ellipse cx="22" cy="32" rx="14" ry="18" stroke-width="4"/><ellipse cx="42" cy="32" rx="14" ry="18" stroke-width="4"/><path d="M28.4 18.6 Q 32 22 32 32 Q 32 42 28.4 45.4" stroke-width="4" stroke-linecap="round"/></svg>
                </div>
                <h1>MMP Poker <span class="suit suit-red">♥</span><span class="suit suit-dark">♣</span></h1>
                <p>Digital dealer for Texas Hold&rsquo;em.</p>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="userSelect">Select user</label>
                    <select
                        id="userSelect"
                        name="userSelect"
                        required
                    >
                        <option value="">— Select a user —</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="displayName">Display name</label>
                    <input
                        type="text"
                        id="displayName"
                        name="displayName"
                        placeholder="Your display name"
                        maxlength="50"
                    >
                    <small class="form-help">You can update your display name before joining.</small>
                </div>

                <button type="submit" class="primary">Take a seat &rarr;</button>
            </form>

            <div class="community-link-section">
                <a href="/community" class="community-link">Community Display &rarr;</a>
                <small class="form-help">View community cards on a shared screen.</small>
            </div>
        </div>
    </div>

    <footer class="app-footer">
        <a href="#" onclick="location.reload(); return false;">Made with 💕 in the 6ix</a>
    </footer>

    <script src="/js/auth.js"></script>
</body>
</html>
